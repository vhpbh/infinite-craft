name = "yetzira-yehudit"
main = "worker.js"
compatibility_date = "2026-07-19"

# D1 binding - שם ה-binding (DB) הוא מה ש-worker.js מצפה לו כ-env.DB.
# את ה-database_id מקבלים אחרי יצירת ה-DB (ר' הוראות בהמשך).
[[d1_databases]]
binding = "DB"
database_name = "yetzira-yehudit-db"
database_id = "35ac1481cc1cc9dfc7c9d7a008320ceb"

# Cron Trigger - מפעיל את ה-scheduled() handler ב-worker.js פעם ביום ב-03:00 UTC,
# מחליף את pg_cron של Supabase (ניקוי activity_log ישן מ-30 יום).
[triggers]
crons = ["0 3 * * *"]

# משתני סביבה רגילים (לא סודיים) - GROQ_MODEL אופציונלי, ברירת מחדל בקוד אם לא מוגדר.
[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"

# GEMINI_API_KEYS ו-GROQ_API_KEYS הם *סודות* (מכילים מפתחות API) - לא מוגדרים כאן בקובץ,
# אלא דרך "wrangler secret put" או מהדשבורד (ר' הוראות בהמשך).
